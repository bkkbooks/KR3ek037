front:
  text: 原序始豫奉親攜幼來官泉江未入境首問邑有良醫師乎又問市有佳藥肆乎或對以醫固不乏人而庸庸者實多藥肆僅一二數然稍貴細者則缺焉豫謂二者老幼所依以為命也今顧若此其奈之何哉或曰邑有李嗣立廷評者廣收方書多蓄藥味有問方者必告有求藥者必與了無吝色厭心豫固私竊慶幸時方至旅見亦未暇詢及也久之嗣立來請問一作間與之款語見其持心近厚非愛人利物之言不談叩以難素脈訣病源等書其應答如流厥後家人子或有病疏方惠藥雖數不憚煩三年間不醫之求而唯嗣立之謁一日嗣立出示一編曰此治背瘡方也今人例以此為惡疾悉付之外科而邈不加之意不知治療之失宜蓋未有能得全其生者某於此究心有年所活甚衆君能捐二三萬錢刻板流存不猶愈於刊他書乎豫且圖之會有黃冠師曰劉道淵者主邑之太霄觀忽得此疾劉素號曉方脈得嗣立之書而敬信之凡服藥次第悉案書以從事不兩月遂獲安豫益信其書之有驗乃為之序其首嗣立名迅以儒傳家父兄相繼收科子弟亦登名賢書鄉評翕然推重豫與其兄嗣宗嘗同校長沙試契分為不薄又有針膏起廢之功故樂為之成其志云郭應祥序
