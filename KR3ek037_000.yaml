body:
  text: 背疽方總論背疽之方所傳百餘然有驗者極少其間一作中又有用藥偏重或太冷或太熱或藥性有毒者今皆不録獨擇嘗用而經驗者録之庶幾不至有誤活人治病之意背疽其源有五天行一瘦弱氣滯二怒氣三腎氣虛四飲冷酒食炙煿物服藥熱毒五蓋治背疽不可一概將為熱毒其治之法難易當自一而至五察疽發有內外之別初發疽時一粒如麻豆大身體便發熱生疽處肉亦熱腫大而高多生疼痛破後肉色紅紫此為外發雖大若盆碗如用藥有理有百人百可活如初發疽時不拘小大身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不高不疼不痛低陷而壞爛破後肉紫黑色此為內發有此證者未發見之先臟腑已有潰爛百人百不救雖有神仙藥亦付之無可奈何審內證用藥自瀉嘔吐不思飲食診脈而腎脈最虛此等古人皆以為不治之證然尚有救療之理服補藥捷徑腎脈虛甚當用補藥而有抵牾處如用鹿茸附子之藥是抱薪救火如用平補之藥腎氣又猝難平復若俟河之清向來有一貴人苦疽疾正生此一證諸醫無策愚云昔嘗聞一名醫講論凡人遇五更初腎氣必開若一語言咳嗽即腎氣復合遇腎開時進一服平補藥其功效勝尋常服峻補之藥十數服愚以此策獻之遂選用山藥丸所用皆平補腎氣全無僣燥偏重之藥依此法而進詳以告病者與其侍旁之子弟如法而服藥三日之後醫有診脈知其腎脈已平復矣則有疽疾人腎脈虛弱未可便如古人之論以為不可治若人有痼冷虛弱危困之疾如其法而用藥可謂用力寡而收功倍矣案山藥丸缺疽發所在有不可治者腦上諸陽所會穴近腦則髓出頸項上近咽喉藥餌飲食之所通一有所礙兩不能進腎俞上與腎相抵命之所繫穴即透空又不可著艾三處有疽併為難治戒忌作勞叫怒嗜欲飲食如干濕面炙煿淹藏冷酒生冷滯膩魚羊並不可食性熱者發熱冷者損脾腎毒者發病皆當戒之病者之房深戒有腋氣人並有孕婦人月經人入房合藥亦忌此等人見之又忌雞犬貓兒見之已上戒忌安後半載間血氣未定猶定一作當謹戒不廢藥餌方能保全疽瘡之方有驗者載於方書然有貧乏無錢買藥又有適居僻邑草市難得藥材只得服草藥鸕鷀藤酒續以麥飯石膏塗敷神異膏貼之亦屢用取效若無麥飯石膏如田夫野人只用神異膏亦可麥飯石膏案此方原缺今從蘇沈良方補入白麥飯食石色黃白類麥飯者猶佳炭火燒赤醋中浸之十遍研白蘞末與石等分鹿角不用自脫者須元帶腦骨者截用二三寸炭火燒至煙盡為度杵為末並前二味上並搗細末取多年米醋於銚中煎令魚眼沸即下前件藥末調如稀錫以萆子塗敷腫上只當瘡頭留一指地勿令合以出熱氣如未膿當內消已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即布上塗藥貼之干即再換但以鬲中穴無不瘥其瘡切忌手觸宜慎之麥飯石膏論麥飯石膏治背疽之疾神妙莫比惜乎世人罕有能知者然古方所載用藥制度略而不詳則其間藥材不真修制苟簡是自致其無驗非方之誤也愚親見一貴人有此疾醫者用麥飯石膏塗貼不惟無效又且添痛楚更以毒藥盦之膿亦不潰晝夜終痛不得安寢瘡逐日開大浸至兩脅又於咽喉腳膝間遍發數疽醫者盡以為不可治療愚雖預備此藥選擇修制既良且精而未敢便用俟諸藥縮手試以用之一夕之間疼痛盡止膿血俱潰來如湍水病者安寢衆皆驚愕以謂別有神藥殊不察止於麥飯石膏也疽疾須得膿血潰散之多即使毒氣隨膿血出不至內傷臟腑病者得安有一庸醫見膿不潰遂打兩錫管欲插入疽以口汲出其膿愚謂用此則病者必不可救力沮其説又用薦席開其一竇使病者仰臥以取膿此説不可諫因令試之膿亦不來後卒用愚所合麥飯石膏而取效自此而後鄉閭有此疾者來下問因録此方俾精擇修合盡取十全之功愚故詳著之一癰疽初作之時便合用麥飯石膏四圍塗敷以護其根腳不可使開中心卻要留癰口如錢大使毒氣出如癰漸小隨其大小敷之直候疽破膿潰之後口收止猶徑寸許用神異膏點敷收住卻用麥飯石膏神異膏治一切瘡疥按此方原缺今從危亦林得效方補入全蠍七個去毒皂角一錠銼碎巴豆七粒去殼蛇床子三錢清油一兩黃蠟半兩輕粉半匙雄黃別研三餞上先用皂角全蠍巴豆煎油變色去了三味入黃蠟化開取出冷處入雄黃蛇床末輕粉和勻成膏先用苦參湯溫洗後以藥擦瘡疥上神效又神異膏此方從赤水元珠補入黃耆杏仁元參各一兩上用麻油二斤煎至將黑加蛇脫五錢蜂房一兩男子發一團如雞子大再煎至黑去滓徐徐下黃丹不拘多少得中為度文武火熬收治疽癰用藥大綱此書所著方頗為周備但欲使用藥者不可不知之爾然人能逐一玩味詳説深思用藥之意臨時看其病證次第用藥無有不效近時有親舊得此病為愚醫所惑或用君臣藥或用草藥其病益多痛楚日增然後回心杜絶衆醫用愚方間蒙下問但指示三五方與之服餌無有不安者今略書用藥要領與夫先後之序畫一於後一初覺時背疽之疾便令服內托散後來不生變證口舌無瘡此藥但可服十數服而止內托散大止疼痛如未破即點破有膿此方原缺今從惠濟寶書補入川烏一兩泡茯苓三分苦杖半兩獨活白芷甘草炙各一兩上為末每服二錢酒調下日三服一即令繼服五香連翹湯服此藥如大便寬快內熱既省即令住服若一二日之後大便再閉須令再服要取利毒氣至盡然後住服亦合看病人虛實量其輕重而進藥五香連翹湯木香三分不見火沉香三分不見火連翹全者去蒂三分升麻三分黃耆三分揀無叉附者生用木通三分去節甘草半兩生用丁香半兩揀去枝杖不見火乳香半兩別研大黃微炒半兩銼麝真者一錢半別研桑寄生三分難得真者缺之亦可獨活三分買老羌活用今鋪家所賣獨活乃是土當歸不堪用上為粗末和勻每服三大錢水一盞煎至七分去滓服留滓二服用水二盞再煎作一服積四散滓用水三盞又再煎作一服然後不用其滓方用銀器煎藥如無銀器入銀一片同煎內桑寄生一味最能療病但難得真者如缺用升麻代今已加升麻若無真桑寄生則升麻分兩當倍用一次令多服洪氏排膿內補散無嘔逆之證用好酒下有嘔逆之證合用木香湯下此一藥合與癰疽相為終始服餌不可輟化毒排膿內補十宣散亦名托裡十補散治一切癰疽癤瘡未成者速潰敗膿自出無用手擠惡肉自去不犯刃使服藥後疼痛減其效如神此方原缺今從和劑局方補入黃耆以綿上來者為勝狀如箭竿長二三尺頭上叉者洗淨寸截捶破撕擘以鹽湯潤透用盞盛湯瓶上一炊久焙燥隨衆藥入研即成細末人參以新羅者為上擇團結重實滋潤洗淨去蘆薄切干搏用當歸取川中來者擇大片如馬尾狀滋潤甜辣芬香者溫水洗薄切焙乾用各一兩厚朴用梓州者肉厚而色紫掐之油出去粗皮切薑汁窨一宿爁熟焙燥不用杜朴桔梗以有心味苦者為真無心味甘者薺苨也主解藥毒切勿誤用泥淨去頭尾薄切焙燥桂心用卷薄者古法帶皮桂每兩止取二錢半合用一兩當買四兩候衆藥罷別研不得見火芎藭以川中來者為上今多撫芎大塊者洗淨切焙防風擇新香者洗淨切焙甘草生用白芷各一兩上十味選藥貴精皆取淨曬焙極燥方稱除桂心外一處搗羅為細末入桂令勻每服自三錢加至五錢熱酒調下日夜各數服以多為妙服至瘡口合更服猶佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒力之勝也或飲酒不多能勉強間用酒調並以木香湯用酒功效當不減於酒也大抵癰疽之作皆血氣凝滯風毒壅結所致治之不早則外壞肌肉內攻臟腑其害甚大才覺便服倍加服數服之醉則其效速發散風毒流行經絡排膿止痛生肌長肉藥性平和老人小兒婦人室女皆可服之木香湯治癰腫一作疽初結頭痛寒熱氣急方此方原缺今從聖濟總録補入木香藿香葉沉香薰陸者丁香各一兩上五味粗搗篩每服五錢鹽水一盞半煎至八分去滓空心溫服取滓敷膊上日二一嘔逆有二證一證謂其初發時不曾服內托散伏熱在心一證有氣虛脾氣不正而嘔合仔細看病證參酌用藥若是因熱而嘔外證心煩身熱癰作痛此即是伏熱在心合將內托散服三兩服而止不可多服若是氣虛而嘔其證心不煩熱遇早便嘔或聞穢氣亦嘔早晨合服嘉禾散如有寒熱合服家傳正氣散五更初當服山藥丸以補其腎一發背人雖云有熱未有不至腎虛而得之者若疽疾減退五分之後便合如前法五更初服山藥丸一服嘉禾散案原方缺論服嘉禾散如病人氣弱不進飲食合服嘉禾散於內加白豆蔻仁分兩昨有一貴人苦疽疾醫者用藥失序久而不痊因致虛弱全不飲食愚欲進嘉禾散而諸醫爭言內有丁香發熱不可用殊不知治疽之藥丁香預其一況有因怒氣而發疽今嘉禾散中所用之藥盡是平和益脾胃降氣之藥辨論不勝遲遲數日服他藥無效卒用之而病人方能進食自此以後遇早晨住服參苓必進嘉禾散一服疾安而後已家傳不換金正氣散治背疽先感風寒脾氣不正寒熱嘔吐蒼朮揀黃色不爛者先用米汁浸夏秋半日春冬一日洗淨再用新汲水浸一宿削去黑皮銼焙與麥麩同炒至色黃香熟去麩用四兩淨厚朴揀紫色者削去粗皮及中間一重黑心如紙厚要銼三寸長劈作薄片每厚朴五兩淨用生薑五兩淨連皮薄切搗爛同淹一宿以文武火翻覆炙五七次炙至薑滓焦黑刮去薑不用只用厚朴細銼取四兩淨再用薑四兩連皮薄切搗爛同厚朴和一處再淹一宿入銚內用文武火炒至乾用甘草炙削去赤皮細銼取二兩淨陳橘皮買真橘皮以水浸三時久洗去黑齙掠去肉白筋與瓤銼焙取三兩淨上四味同為一處再入鍋內文武火微炒一次卻用紙盛於木板上出火毒半夏湯泡七次削去黑臍細銼焙乾研為細末以生薑自然汁和作薄餅子安文武火上炙至黃熟為度取二兩淨藿香去枝杖取葉用以水洗淨去沙塵有日曬乾無日以微火焙一兩淨人參一兩去頂細銼焙木香一兩濕紙裹煨至紙干為度去紙細銼白茯苓一兩去黑皮銼上將前四味已炒藥續入後五味半夏藿香等不炒同一處碾羅為細末一錢水一盞生薑錢三片棗一枚同煎至八分臨熱入鹽少許溫服無時論服不換金正氣散近時有數人病背疽服前方藥餌未安之前遍身寒熱或先寒後熱或先熱後寒連日作或間日作必先嘔痰然後寒熱寒熱後大汗然後止時醫多欲用柴胡牡蠣止汗之藥又有以為瘧疾欲下恆山飲子愚力辨云背疽之後不可專以為有熱亦有氣虛而得之亦有因怒氣並血氣凝滯而得之其所以發寒熱者先感寒邪脾氣不正痰盛而有此證若下柴胡必瀉肝母既虛而又瀉其子牡蠣澀氣氣血已不榮運服澀氣恆山飲子發吐痰大損脾胃用藥如此可謂誤謬愚但令服家傳不換金正氣散祛寒邪正脾氣痰飲自消寒熱不作兼服排膿內補散以木香湯易酒不欲飲引嘔吐故也服此藥三日寒自退嘔吐不作汗亦自止一癰疽才破有口便合用豬蹄湯洗其次一作初連日洗五日後間日洗欲安之際三日一洗豬蹄湯治癰疽腫塊消毒氣去惡肉凡有瘡口便用此藥淋洗香白芷不見火甘草生用獨活用老羌活黃芩去心赤芍藥去皮當歸去蘆洗淨沙土露蜂房取有蜂兒者用已上各等分為粗末上先將獖豬前蹄兩隻一斤只用白水三升煮軟將汁水兩次澄清去上面油花下面滓肉每次用藥粗末一兩投於汁中再用文武火煎十數沸濾去滓以故帛蘸藥溫湯徐徐薄揩瘡上死肉惡血隨洗而下淨洗訖以故帛試干仍避風忌入口氣吹之有狐臭人並月經見行婦人貓犬並不令入病房洗瘡切弗以手搐著洗疽之方所傳三四十用之止此一方極神效內所用露蜂房最有理謂其以毒驅毒也一治背疽初作根腳闊大如碗未有尖頭尋灸穴法凡覺背上腫硬疼痛用濕紙貼腫上看先干處是頭碾大蒜十頭入淡豉半合乳香一塊如龍眼大細碾隨瘡頭大小用竹片作圈子竹片闊二分許隨其大小頓在瘡頭上將所碾藥填平鋪艾灸之痛處以癢為度癢處以痛為度亦以百壯為準一癰疽既破膿血潰多或五日或七日後用神異膏貼敷若根腳小五日後貼如闊大須七日十日後可貼一疽疾將安之際合多服加料十全湯以補其氣血使易生肌肉故也加料十全湯治癰疽後補氣血進飲食疽疾將安及七八分便當服此藥每日與排膿內補散相間服黃耆揀不用叉附及蛀者銼作二寸長截拍扁以冷鹽湯濕潤之瓦器盛蓋甑上蒸三次焙銼用熟乾地黃揀肥大滋潤者洗淨焙乾用好瓶酒濕潤瓦器盛蓋於飯甑上蒸曬如此七次銼焙二味各用一兩淨當歸去蘆淨洗取自頭至中心一截銼焙乾用自中至尾留合別藥川芎銼微焙人參去頂銼焙白茯苓去黑皮銼焙甘草炙白芍藥揀有皮者買無皮是偽者削去皮銼焙用肉桂削去粗皮銼不見火天台烏藥如無真者可買隆興府大塊者用銼焙白朮用米泔浸半日銼到小指頭大方塊焙乾再用麥麩炒至黃色不得傷火去麩將白朮銼用陳皮不用沙柑子皮水浸削去白瓤焙銼真白五味子核如豬腎形肉微黑重者是真揀去枝杖炒過用核如沙柑子核者是土五味子不堪用已上十一味各半兩上各乾淨稱銼作散和勻每服藥一兩用水一碗生薑五片北棗二枚同煎至八分碗濾去滓取清汁分作兩服留滓曬乾碾羅為細末後來常服水一盞生薑三片棗一枚煎至八分服之一前後病背疽人多是先發渴而後背疽作不然背疽安而後發渴疾因此不救者甚多若有渴疾人則合專服加減八味丸能使渴疾既安疽疾不作若驟得背疽之疾既安之後不問有無渴證便合常服加減八味丸非特可以杜渴疾之將來亦且大能滋益氣血生長肌肉使精神強健此乃纍試之驗加減八味丸治癰疽後合服補藥若用峻補之藥則發熱又況癰疽既安之後多傳作渴疾不可治療當預服此藥如能久服永不生渴疾氣血和壯未發疽人或先有渴症亦合服此藥渴疾既安疽亦不作熟乾地黃如法揀好者買制度過焙銼二兩真山藥銼細微炒山茱萸去核取肉焙乾二味各一兩肉桂味辛辣薄者買削去粗皮銼不見火用一兩別研取半兩滓末和入衆藥余粗滓仍勿用澤瀉水洗銼作塊無灰酒濕瓦器盛蓋甑上蒸五次銼焙牡丹皮去心枝杖銼炒白茯苓去黑皮銼焙已上三味各八錢北真五味子揀去枝杖慢火炒至透不得傷火一兩半別研羅和入衆藥此一味最要真者其詳已著十全湯內上研羅為細末煉蜜候冷和丸如梧桐子大每服三十丸空心無灰酒或鹽湯任下論渴疾本原有一貴人病疽疾未安而渴作一日飲水數升愚遂獻此方諸醫失笑云此藥若能止渴我輩當不復業醫矣諸醫盡用木瓜紫蘇烏梅參苓芍藥等生津液止渴之藥服多而渴愈甚數日之後茫無功效不得已用此藥服之三日渴止因此相信遂久服之不惟渴疾不作氣血益壯飲食加倍強健過於少壯之年蓋用此藥非愚敢自執鄙見實有源流自為童兒時聞先君言有一士大夫病渴疾諸醫遍用渴藥治療纍載不安有一名醫誨之使服加減八味丸不半載而疾痊因疏其病源云今醫多用醒脾生津止渴之藥誤矣而其疾本起於腎水枯竭不能上潤是以心火上炎不能既濟煎熬而生渴今服八味丸降其心火生其腎水則渴自止矣後疏其藥性云內真北五味子最為得力此一味獨能生腎水平補降心氣大有功效家藏此方親見有驗故敢詳著之使有渴疾者信其言專志服餌而取效無為庸醫所惑庶廣前人制方濟惠之意癰口將收論癰口將收之際最忌用急澀斂口之藥只宜用神異膏貼多見昧者立説破此一段不過病者厭於將理醫者急欲獲利不思毒氣發泄未盡其疾再來人命自此不救癰久瘡口不合論一治癰久而瘡口不合其肉白而膿血少此為瘡口冷滯乃病人氣血枯竭不潮於瘡遂致如是合用白北艾湯洗神異膏貼多服排膿內補散每日用好北艾葉一把入瓦器內濃煎湯避風處乘熱用艾湯澆洗瘡口四圍淨肉以舊絹帛兜艾葉乘熱沃澆一日一次洗了須避風仍燒松香以煙燻瘡口良久用神異膏貼之其瘡不可與厭穢之人見若不能禁忌瘡口難安藥亦無效一病癰疽之人適被庸醫用毒藥掩盦或以針刀傷割不能生肌肉瘡口不合切不可用急澀斂口藥當只用豬蹄湯北艾湯相間洗以神異膏貼之並服排膿內補散一前方但是居於州縣間有力者能及之若適在鄉原與夫無力以市藥者只可用鷺鷀藤酒一方終始服餌俟其疽破即以神異膏貼之蓋神異膏所用藥材皆非貴細難得之藥前後用此以醫田夫野老百發百中大川烏丸治發背活經絡生肌肉大川烏生去皮尖當歸赤芍蘇木銼炒沒藥生用一兩別碾乳香一兩別碾穿山甲用蚌粉炒脆去粉二兩獨活合用老羌活今鋪中所賣獨活乃土當歸不可用二兩上為細末和勻酒煮麵糊為丸梧桐子大溫酒下三十丸空心下二烏丸治發背托裡定痛驅風毒涼血羌活去苗薄荷葉各三兩川芎以上各不見火元參地榆麻黃去節防風去蘆天麻白芷白殭蠶用直者去絲足口牛蒡子炒蔓荊子去蒂並白膜旋覆花去萼荊芥穗各二兩甘菊花三兩何首烏四兩甘草炙四兩半蟬蛻去足半兩上為細末煉蜜丸如彈子大每服一丸細嚼茶清任下食後服退毒下膿漏蘆湯治疽作二日後與五香連翹湯相間日服之黃耆生用連翹各一兩大黃一分微炒漏蘆一兩有白茸者甘草半兩生用沉香一兩上為末薑棗湯調下此二方連日相間服乃宣毒之藥覺毒盡住服參苓順氣散治病癰疽人進飲食降氣健脾烏藥一兩半人參一分茯苓一分白者青皮去白半兩麩炒半兩蜜炙真紫蘇子二錢半微炒上為細末每服末二錢水一盞薑棗煎至八分早晨空心溫服煎藥不用紫薑能發熱動氣當用老薑連皮使梔子黃芩湯治發背瘡潰後因飲食有傷調攝不到發熱不住用以退熱漏蘆連翹山梔子仁黃芩去心各二兩半黃耆生用一兩防風石韋合使桑白皮自取者甘草生犀角生用人參苦參白茯苓各二錢半上已上為粗末每服四錢水一中盞煎至六分去滓溫服蚣蠍散治癰疽瘡口小而硬貼膏藥而膿不來此為風毒所勝赤足蜈蚣一條去頭足生用全蠍三個去爪要有尾者生用木香一錢重上為細末每用時先以豬蹄湯藥洗疽了以此藥一匙許糝於膏藥面上近瘡口貼其效如神每用神異膏合先量疽大小塗在紙花上了卻用此藥糝於膏藥上要使先到瘡故也若瘡口闊大及不硬則不必用此內托黃耆丸治因用針砭傷其經絡白膿赤汁逗流不止黃耆八兩生用當歸二兩洗焙肉桂去粗皮木香乳香別研沉香以上四味各一兩上為細末用緑豆粉四兩生薑自然汁煮糊丸如梧桐子大每服五十丸溫熱水下不拘時候沉麝湯治發背疽之人斂口生肌不得用躁急之藥合用麥飯石膏塗續用好膏藥貼之瘡口自然斂合如醫治後時為庸醫用毒藥掩盦或刀割傷內血重者兼服此木香麝香沉香藿香葉連翹上等分為細末每服二錢水一盞煎至七分溫服無時疽疾既已先服取毒之藥又用麥飯石膏塗貼五七日之後病漸減退合服大川烏丸二烏丸驅除餘毒活氣血生肌肉排宿膿去風邪又合服洪氏內補散多服為妙立效散治發背及諸癰疽並瘰癧有效皂角刺半斤揀去枯者細銼炒赤色為度須耐久妙甘草二兩合生用栝蔞五個去皮取肉並仁搗研炒黃乾者不必炒乳香半兩別研和入沒藥一兩別研和入上五味為末每服二錢酒調下乳癰與前方間服神妙神妙忍冬丸療病既愈須預防發癰疽宜忍冬草左纏藤是也不拘多少根莖花葉皆可用上以酒於瓶內浸以粳火煨一宿取出曬乾入甘草少許為末以所浸酒為糊丸如梧桐子大每服五十丸至百丸酒飲任下不拘時治一切癤毒癰疽將結則散已聚則破已破痛不可忍者貼之則寬止痛神效不可具述按以下所制方皆不另立方名無鹽桃末皂角末白芷末荊芥末草烏頭末上等分用米醋調貼四圍留中蜜調亦得癰癤不可用膏藥貼合論治些小癰癤結而未成不可用膏藥貼合以藥塗使內自消每用生取鹿角尖於砂鉢內同老米醋今俗呼黃子醋濃磨時以鵝翎塗拂於癰癤四圍當中留一口遇干再塗一二日即內消每覺有些小癰癤疼痛發熱時便用生甘草節不炙不焙用日曬乾若無日焙於籠蓋上微火碾為細末以熱酒調二三錢服連進數服疼痛與熱皆止治癰疽未結成並血氣凝滯腫結成塊者用吳茱萸微炒碾為細末雞子清調塗神妙疾輕者宜用此治癰疽發背神方金銀花一名忍寒草上採葉研為滓每用不限多少納瓷瓶中入水用文武火濃煎臨熱入好無灰酒與藥汁相半再煎十數沸濾滓時時服之留滓焙乾碾羅為細末酒煮麵糊為丸梧桐子大每服三十丸空心溫酒下丸藥俟疾稍退可以常服蓋其力輕甚故也預防癰疽方服此藥可以終身無此疾綿黃耆七兩揀如箭捍樣性軟者用蘆並叉附不用一半生使細銼焙乾一半銼作寸長截捶匾以蜜水浸潤濕瓦器盛蓋於飯甑上蒸三次取出焙乾銼碎粉草去節並去皮一兩半淨將一半生細銼焙一半炙黃銼焙上二味碾為細末每服二錢早晨日午白湯煎常當湯水服夜候飲酒初杯用酒調服若平日能如此常服之終身不患癰疽之疾案以上各方不見於諸論中今總集之附於諸論之後腦疽不可灸引其氣一上痰涎膿血並起上攻傾人性命急於反掌但當急灸三里穴並氣海漸漸服涼胸膈化血之藥人可小安此説載通神方論腦疽咽喉生疽古法皆不治之證此灸法引毒氣歸下其理頗長得此疾者豈可坐受其斃當信而用之栝蔞散治婦人乳癰奶勞神效今俗呼奶勞即此疾之漸栝蔞一個去皮焙研為末急用則爛研子多者有力當歸淨洗去蘆焙細半兩甘草半兩細銼生用通明沒藥一分別研乳香一錢別研上用無灰酒三升同於銀石器中慢火熬取一升清汁分作三服食後良久服如有奶勞便服此藥可絶病根如毒己成能化膿為黃水毒未成即於大小便中通泄疾甚再合服以退為妙婦人乳疽方雖多獨此一方神效無比萬不失一按以上二方一治腦疽一治乳疽皆與背疽無涉以其為李氏之書故並附於此
